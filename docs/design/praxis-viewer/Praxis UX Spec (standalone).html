  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ab90ea86-7db8-456e-b71c-a0c591b683d3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<!-- @template name=\"Praxis UX Spec\" description=\"RFC-styled UX specification with pass-by-pass wireframes, rendered in the DHK Electric Cobalt language.\" -->\n<helmet>\n<script src=\"52062f40-5580-4d91-8074-10def8535d7c\"><\u002Fscript>\n<style>\n  body { background: var(--bg); }\n  a { color: var(--accent); }\n  a:hover { color: var(--accent-hover); }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width: 980px; margin: 0 auto; padding: 72px 24px 120px; font-family: var(--font-sans); color: var(--text);\">\n\n  <!-- ── HERO ────────────────────────────────────────── -->\n  <div style=\"font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--accent); margin-bottom: 20px;\">Praxis / spec /<\u002Fdiv>\n\n  <div style=\"display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 24px;\">\n    <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"essay\" hint-size=\"70px,24px\">RFC-0002<\u002Fx-import>\n    <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"tool\" hint-size=\"80px,24px\">UX SPEC<\u002Fx-import>\n    <span style=\"font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--text-dim);\">Status Draft · v0.1 · Depends on RFC-0001<\u002Fspan>\n  <\u002Fdiv>\n\n  <h1 style=\"font-size: clamp(40px, 5vw, 60px); font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; max-width: 780px;\">A viewer for the artifact trail<\u002Fh1>\n\n  <p style=\"font-size: 19px; line-height: 1.6; color: var(--text-muted); max-width: 680px; margin-top: 24px;\">A static web UI where a user enters or uploads a document, runs the Praxis pipeline once, and steps through each pass with its artifacts. The UI inspects the completed trail — it adds no transformation logic of its own.<\u002Fp>\n\n  <div style=\"display: flex; gap: 32px; flex-wrap: wrap; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);\">\n    <div><div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);\">Surface<\u002Fdiv><div style=\"font-size: 15px; color: var(--text-muted); margin-top: 6px;\">One page · two zones<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);\">Engine<\u002Fdiv><div style=\"font-size: 15px; color: var(--text-muted); margin-top: 6px;\">Python via Pyodide<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);\">Deploy<\u002Fdiv><div style=\"font-size: 15px; color: var(--text-muted); margin-top: 6px;\">Static · no backend<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);\">Passes<\u002Fdiv><div style=\"font-size: 15px; color: var(--text-muted); margin-top: 6px;\">6 · one panel each<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 01 OVERVIEW ─────────────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">01 — Goals &amp; non-goals<\u002Fx-import>\n\n  <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 48px;\">\n    <div>\n      <h3 style=\"font-size: 20px; font-weight: 600; margin-bottom: 20px;\">Goals<\u002Fh3>\n      <ul style=\"list-style: none; display: flex; flex-direction: column; gap: 14px;\">\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-muted);\"><span style=\"color: var(--accent); font-family: var(--font-mono);\">→<\u002Fspan> Enter a document by paste, upload (<span style=\"font-family: var(--font-mono); font-size: 13px;\">.md<\u002Fspan> / <span style=\"font-family: var(--font-mono); font-size: 13px;\">.txt<\u002Fspan>), or a bundled example.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-muted);\"><span style=\"color: var(--accent); font-family: var(--font-mono);\">→<\u002Fspan> Step through the six passes, one screen per pass.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-muted);\"><span style=\"color: var(--accent); font-family: var(--font-mono);\">→<\u002Fspan> Trace the evidence chain: transformation → recommendation → observation.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-muted);\"><span style=\"color: var(--accent); font-family: var(--font-mono);\">→<\u002Fspan> Download the complete artifact trail — the same six files the CLI writes.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-muted);\"><span style=\"color: var(--accent); font-family: var(--font-mono);\">→<\u002Fspan> Deploy as a static site on GitHub Pages or Vercel with no backend.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <h3 style=\"font-size: 20px; font-weight: 600; margin-bottom: 20px;\">Non-goals <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); font-weight: 400;\">(v1)<\u002Fspan><\u002Fh3>\n      <ul style=\"list-style: none; display: flex; flex-direction: column; gap: 14px;\">\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-dim);\"><span style=\"font-family: var(--font-mono);\">×<\u002Fspan> No accounts, persistence, or server storage — documents never leave the browser.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-dim);\"><span style=\"font-family: var(--font-mono);\">×<\u002Fspan> No editing of transformation packs (view-only).<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-dim);\"><span style=\"font-family: var(--font-mono);\">×<\u002Fspan> No accept/reject of individual transformations mid-run.<\u002Fli>\n        <li style=\"display: flex; gap: 12px; font-size: 15px; line-height: 1.6; color: var(--text-dim);\"><span style=\"font-family: var(--font-mono);\">×<\u002Fspan> No LLM calls — the pipeline stays deterministic and auditable.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 02 THE ONE PAGE ─────────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">02 — The one page<\u002Fx-import>\n\n  <p style=\"font-size: 16px; line-height: 1.75; color: var(--text-muted); max-width: 680px; margin-bottom: 12px;\">The pipeline executes in milliseconds, so the UI does not animate execution. It runs the whole pipeline <strong style=\"color: var(--text);\">once<\u002Fstrong>, then lets the user walk the completed artifact trail. <strong style=\"color: var(--text);\">Stepping is inspection, not execution<\u002Fstrong> — consistent with \"the artifact trail is the product.\"<\u002Fp>\n\n  <!-- Layout anatomy -->\n  <div style=\"background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-top: 28px;\">\n    <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px;\">Anatomy · one page, two zones<\u002Fdiv>\n\n    <!-- persistent stepper zone -->\n    <div style=\"border: 1px dashed var(--border); border-radius: 4px; padding: 14px; background: var(--bg);\">\n      <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">Zone A — persistent pass stepper<\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 6px; flex-wrap: wrap;\">\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--accent); color: #fff;\">1 Input<\u002Fspan>\n        <span style=\"color: var(--text-dim);\">→<\u002Fspan>\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted);\">2 Observe<\u002Fspan>\n        <span style=\"color: var(--text-dim);\">→<\u002Fspan>\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted);\">3 Recommend<\u002Fspan>\n        <span style=\"color: var(--text-dim);\">→<\u002Fspan>\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted);\">4 Transform<\u002Fspan>\n        <span style=\"color: var(--text-dim);\">→<\u002Fspan>\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted);\">5 Validate<\u002Fspan>\n        <span style=\"color: var(--text-dim);\">→<\u002Fspan>\n        <span style=\"flex: 1; min-width: 96px; text-align: center; font-family: var(--font-mono); font-size: 12px; padding: 8px 4px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border); color: var(--text-muted);\">6 Report<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- pass panel zone -->\n    <div style=\"border: 1px dashed var(--border); border-radius: 4px; padding: 14px; background: var(--bg); margin-top: 10px; min-height: 120px;\">\n      <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">Zone B — pass panel (content of the active step)<\u002Fdiv>\n      <div style=\"display: flex; gap: 10px;\">\n        <div style=\"flex: 2; height: 90px; border-radius: 3px; background: repeating-linear-gradient(45deg, var(--bg2), var(--bg2) 8px, var(--bg3) 8px, var(--bg3) 16px);\"><\u002Fdiv>\n        <div style=\"flex: 1; height: 90px; border-radius: 3px; background: var(--bg2); border: 1px solid var(--border-light);\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- run lifecycle -->\n  <h3 style=\"font-size: 20px; font-weight: 600; margin: 44px 0 20px;\">Run lifecycle &amp; stepper states<\u002Fh3>\n  <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\">\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; padding: 18px; background: var(--bg2);\">\n      <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-teal); margin-bottom: 10px;\">Before a run<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">Only <strong style=\"color: var(--text);\">Input<\u002Fstrong> is enabled. Steps 2–6 are dimmed and non-interactive.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; padding: 18px; background: var(--bg2);\">\n      <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">After a run<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">All steps enabled, each with a <strong style=\"color: var(--text);\">summary badge<\u002Fstrong>. Free navigation in any order.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; padding: 18px; background: var(--bg2);\">\n      <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-orange); margin-bottom: 10px;\">On edit<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">Editing the input <strong style=\"color: var(--text);\">invalidates<\u002Fstrong> the run — steps 2–6 grey out until re-run.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 03 PASS PANELS ──────────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">03 — Pass panels<\u002Fx-import>\n\n  <!-- Stepper, run-complete state -->\n  <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;\">Stepper — run complete, with summary badges<\u002Fdiv>\n  <div style=\"display: flex; align-items: stretch; gap: 6px; flex-wrap: wrap; margin-bottom: 48px;\">\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text);\">1 · Input<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 4px;\">1,284 words<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--accent); border: 1px solid var(--accent);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: #fff;\">2 · Observe<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 4px;\">12 observations<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text);\">3 · Recommend<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 4px;\">12 proposed<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text);\">4 · Transform<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 4px;\">9 applied / 3 flagged<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text);\">5 · Validate<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--accent-teal); margin-top: 4px;\">pass<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 120px; text-align: center; padding: 10px 6px; border-radius: 4px; background: var(--bg2); border: 1px solid var(--border);\">\n      <div style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text);\">6 · Report<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 4px;\">ready<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PANEL 1 — INPUT -->\n  <div style=\"margin-bottom: 56px;\">\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n      <span style=\"font-family: var(--font-mono); font-size: 13px; color: var(--accent);\">1<\u002Fspan>\n      <h3 style=\"font-size: 22px; font-weight: 600;\">Input<\u002Fh3>\n    <\u002Fdiv>\n    <p style=\"font-size: 15px; line-height: 1.6; color: var(--text-muted); max-width: 680px; margin-bottom: 20px;\">Paste or upload the source, watch live metrics, confirm the pack in effect, then run.<\u002Fp>\n\n    <div style=\"background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 18px;\">\n      <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;\">Wireframe<\u002Fdiv>\n      <div style=\"display: flex; gap: 10px; margin-bottom: 12px;\">\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Button\" variant=\"ghost\" hint-size=\"120px,34px\">Upload file<\u002Fx-import>\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Button\" variant=\"ghost\" hint-size=\"120px,34px\">Load example<\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid var(--border-light); border-radius: 4px; background: var(--bg); padding: 14px; min-height: 120px; font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); line-height: 1.7;\">Paste Markdown source, or drag a .md / .txt file here…<span style=\"display:block; height: 1px; margin: 10px 0; background: var(--border-light);\"><\u002Fspan><span style=\"color: var(--text-muted);\"># The observable universe<br>The results are very significant and quite unique in the field of…<\u002Fspan><\u002Fdiv>\n      <div style=\"display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-light);\">\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);\">8,241 chars<\u002Fspan>\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);\">1,284 words<\u002Fspan>\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);\">58 sentences<\u002Fspan>\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);\">avg 22.1 words/sentence<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 16px;\">\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);\">Pack <span style=\"color: var(--text-muted);\">concise_scientific_writing<\u002Fspan> · v1.2 · 6 transformations<\u002Fspan>\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Button\" variant=\"primary\" hint-size=\"140px,34px\">Run pipeline<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PANEL 2 — OBSERVE -->\n  <div style=\"margin-bottom: 56px;\">\n    <div style=\"display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;\">\n      <span style=\"font-family: var(--font-mono); font-size: 13px; color: var(--accent);\">2<\u002Fspan>\n      <h3 style=\"font-size: 22px; font-weight: 600;\">Observe<\u002Fh3>\n    <\u002Fdiv>\n    <p style=\"font-size: 15px; line-height: 1.6; color: var(--text-muted); max-width: 680px; margin-bottom: 20px;\">Read-only source with each observation's evidence highlighted and colored by safety. The sidebar lists observations grouped by rule; clicking a highlight or a list entry selects and scrolls to its counterpart.<\u002Fp>\n\n    <div style=\"background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 18px;\">\n      <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;\">Wireframe<\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1.6fr 1fr; gap: 12px;\">\n        <!-- source with highlights -->\n        <div style=\"border: 1px solid var(--border-light); border-radius: 4px; background: var(--bg); padding: 14px; font-size: 14px; line-height: 1.9; color: var(--text-muted);\">The results are <span style=\"background: var(--tint-project); color: var(--accent-orange); border-radius: 3px; padding: 1px 3px;\">very significant<\u002Fspan> and quite <span style=\"background: var(--tint-study); color: var(--accent-teal); border-radius: 3px; padding: 1px 3px;\">unique<\u002Fspan> in the field. <span style=\"border-bottom: 2px dashed var(--accent-purple); color: var(--text);\">This long sentence, which spans many clauses and could reasonably be split for clarity, is flagged for review rather than rewritten automatically.<\u002Fspan> The data <span style=\"background: var(--tint-study); color: var(--accent-teal); border-radius: 3px; padding: 1px 3px;\">clearly shows<\u002Fspan> a trend.<\u002Fdiv>\n        <!-- sidebar -->\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <div style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim);\">Rule · hedging<\u002Fdiv>\n          <div style=\"border: 1px solid var(--border-light); border-radius: 4px; background: var(--bg); padding: 10px;\">\n            <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 8px;\"><span style=\"font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);\">obs-04<\u002Fspan><x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"study\" hint-size=\"60px,22px\">SAFE<\u002Fx-import><\u002Fdiv>\n            <div style=\"font-size: 13px; color: var(--text); margin-top: 6px;\">\"unique\"<\u002Fdiv>\n            <div style=\"font-size: 12px; color: var(--text-dim); margin-top: 2px;\">Absolute claim without support.<\u002Fdiv>\n          <\u002F riant=\"ghost\" hint-size=\"150px,34px\">Copy final document<\u002Fx-import>\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Button\" variant=\"ghost\" hint-size=\"140px,34px\">Download final.md<\u002Fx-import>\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Button\" variant=\"primary\" hint-size=\"180px,34px\">Download artifact trail<\u002Fx-import>\n      <\u002Fdiv>\n      <p style=\"font-size: 12px; color: var(--text-dim); margin-top: 10px; font-family: var(--font-mono);\">zip of six files — byte-identical to a CLI run's output directory.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 04 SAFETY COLOR CODE ────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">04 — Safety color code<\u002Fx-import>\n\n  <p style=\"font-size: 16px; line-height: 1.75; color: var(--text-muted); max-width: 680px; margin-bottom: 8px;\">Used consistently across highlights, badges, and diffs. Colors must meet WCAG AA contrast and are always paired with the text label — never color alone.<\u002Fp>\n  <p style=\"font-size: 13px; line-height: 1.6; color: var(--text-dim); max-width: 680px; margin-bottom: 24px; font-style: italic;\">Note: the RFC's green / amber / purple maps onto DHK's semantic accents — teal for <em>safe<\u002Fem>, orange for <em>low-risk<\u002Fem>, purple for <em>review<\u002Fem> — since the Electric Cobalt palette carries no green or amber.<\u002Fp>\n\n  <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;\">\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; overflow: hidden;\">\n      <div style=\"height: 6px; background: var(--accent-teal);\"><\u002Fdiv>\n      <div style=\"padding: 16px;\">\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"study\" hint-size=\"60px,22px\">SAFE<\u002Fx-import>\n        <div style=\"font-size: 14px; color: var(--text); margin-top: 12px; font-weight: 500;\">Applied automatically<\u002Fdiv>\n        <div style=\"font-size: 13px; color: var(--text-dim); margin-top: 4px;\">High-confidence, reversible change.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; overflow: hidden;\">\n      <div style=\"height: 6px; background: var(--accent-orange);\"><\u002Fdiv>\n      <div style=\"padding: 16px;\">\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"project\" hint-size=\"80px,22px\">LOW RISK<\u002Fx-import>\n        <div style=\"font-size: 14px; color: var(--text); margin-top: 12px; font-weight: 500;\">Applied automatically<\u002Fdiv>\n        <div style=\"font-size: 13px; color: var(--text-dim); margin-top: 4px;\">Applied, but worth a glance.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; overflow: hidden;\">\n      <div style=\"height: 6px; background: var(--accent-purple);\"><\u002Fdiv>\n      <div style=\"padding: 16px;\">\n        <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.Tag\" kind=\"tool\" hint-size=\"70px,22px\">REVIEW<\u002Fx-import>\n        <div style=\"font-size: 14px; color: var(--text); margin-top: 12px; font-weight: 500;\">Flagged only, never applied<\u002Fdiv>\n        <div style=\"font-size: 13px; color: var(--text-dim); margin-top: 4px;\">Dashed underline; human decides.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 05 ARCHITECTURE ─────────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">05 — Architecture<\u002Fx-import>\n\n  <h3 style=\"font-size: 20px; font-weight: 600; margin-bottom: 12px;\">Run the Python harness in the browser<\u002Fh3>\n  <p style=\"font-size: 16px; line-height: 1.75; color: var(--text-muted); max-width: 680px;\">The <span style=\"font-family: var(--font-mono); font-size: 14px;\">praxis<\u002Fspan> package is stdlib-only and small. Run it unchanged in the browser via Pyodide (CPython compiled to WebAssembly) so the UI stays evidence of what the harness actually does.<\u002Fp>\n\n  <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px;\">\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; padding: 18px; background: var(--bg2);\">\n      <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;\">Why not a TS port?<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.65; color: var(--text-muted);\">A port is a second implementation of the rules. The two drift, and the UI stops being evidence. One source of truth outweighs load time.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid var(--border); border-radius: 4px; padding: 18px; background: var(--bg2);\">\n      <div style=\"font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;\">Why not serverless?<\u002Fdiv>\n      <p style=\"font-size: 14px; line-height: 1.65; color: var(--text-muted);\">It rules out GitHub Pages, adds a network hop and a privacy question, and still packages the same Python. Client-side keeps both targets open.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"border-left: 3px solid var(--accent); background: var(--bg2); border-radius: 0 4px 4px 0; padding: 14px 18px; margin-top: 16px;\">\n    <p style=\"font-size: 14px; line-height: 1.65; color: var(--text-muted);\"><strong style=\"color: var(--text);\">Cost:<\u002Fstrong> a one-time ~7 MB Pyodide download. Mitigations — load in the background while the user types, cache via service worker, show \"loading engine\" status until ready. The engine boundary below keeps it swappable.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3 style=\"font-size: 20px; font-weight: 600; margin: 40px 0 14px;\">Engine boundary<\u002Fh3>\n  <p style=\"font-size: 15px; line-height: 1.7; color: var(--text-muted); max-width: 680px; margin-bottom: 16px;\">The UI calls a single function and receives the full artifact trail. TypeScript types mirror the dataclasses in <span style=\"font-family: var(--font-mono); font-size: 13px;\">praxis/models.py<\u002Fspan> exactly. Only this module knows Python exists.<\u002Fp>\n\n  <pre style=\"background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 18px; overflow-x: auto; font-family: var(--font-mono); font-size: 13px; line-height: 1.7; color: var(--text-muted);\"><span style=\"color: var(--accent-purple);\">interface<\u002Fspan> <span style=\"color: var(--text);\">PraxisResult<\u002Fspan> {\n  observations:    Observation[];      <span style=\"color: var(--text-dim);\">// observations.json<\u002Fspan>\n  recommendations: Recommendation[];   <span style=\"color: var(--text-dim);\">// recommendations.json<\u002Fspan>\n  transformations: Transformation[];   <span style=\"color: var(--text-dim);\">// transformations.json<\u002Fspan>\n  validation:      Validation;         <span style=\"color: var(--text-dim);\">// validation.json<\u002Fspan>\n  final:           string;             <span style=\"color: var(--text-dim);\">// final.md<\u002Fspan>\n  report:          string;             <span style=\"color: var(--text-dim);\">// report.md<\u002Fspan>\n  metrics: { before: Metrics; after: Metrics };\n}\n\n<span style=\"color: var(--accent);\">runPipeline<\u002Fspan>(source: string): Promise&lt;PraxisResult&gt;<\u002Fpre>\n\n  <div style=\"border-left: 3px solid var(--accent-orange); background: var(--bg2); border-radius: 0 4px 4px 0; padding: 14px 18px; margin-top: 16px;\">\n    <p style=\"font-size: 14px; line-height: 1.65; color: var(--text-muted);\"><strong style=\"color: var(--text);\">Harness prerequisite —<\u002Fstrong> the only change to the existing package: extract the pipeline core from <span style=\"font-family: var(--font-mono); font-size: 13px;\">cli.run<\u002Fspan> into <span style=\"font-family: var(--font-mono); font-size: 13px;\">praxis.pipeline.run_pipeline(text: str) → dict<\u002Fspan> that returns the artifacts instead of writing files. The CLI and the UI shim both call it.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ── 06 ACCEPTANCE CHECKS ────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">06 — Acceptance checks<\u002Fx-import>\n\n  <div style=\"display: flex; flex-direction: column; gap: 2px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden;\">\n    <div style=\"display: flex; gap: 16px; padding: 16px 18px; background: var(--bg2); border-bottom: 1px solid var(--border-light);\"><span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--accent);\">01<\u002Fspan><span style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">Pasting the golden example and running produces artifacts byte-identical (JSON/Markdown content) to <span style=\"font-family: var(--font-mono); font-size: 13px;\">python -m praxis run<\u002Fspan> on the same input.<\u002Fspan><\u002Fdiv>\n    <div style=\"display: flex; gap: 16px; padding: 16px 18px; background: var(--bg2); border-bottom: 1px solid var(--border-light);\"><span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--accent);\">02<\u002Fspan><span style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">Every transformation in step 4 links to a recommendation in step 3 and an observation in step 2.<\u002Fspan><\u002Fdiv>\n    <div style=\"display: flex; gap: 16px; padding: 16px 18px; background: var(--bg2); border-bottom: 1px solid var(--border-light);\"><span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--accent);\">03<\u002Fspan><span style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">A document with no matches runs cleanly: empty observation list, no diff, validation pass.<\u002Fspan><\u002Fdiv>\n    <div style=\"display: flex; gap: 16px; padding: 16px 18px; background: var(--bg2); border-bottom: 1px solid var(--border-light);\"><span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--accent);\">04<\u002Fspan><span style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">A 50 kB document runs without freezing the UI — the pipeline executes in a web worker.<\u002Fspan><\u002Fdiv>\n    <div style=\"display: flex; gap: 16px; padding: 16px 18px; background: var(--bg2);\"><span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--accent);\">05<\u002Fspan><span style=\"font-size: 14px; line-height: 1.6; color: var(--text-muted);\">The site works offline after first load, via service worker.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── 07 OUT OF SCOPE ─────────────────────────────── -->\n  <x-import component-from-global-scope=\"DHKDesignSystem_c5bcb5.SectionDivider\" hint-size=\"100%,80px\">07 — Future · out of scope for v1<\u002Fx-import>\n\n  <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;\">\n    <div style=\"border: 1px dashed var(--border); border-radius: 4px; padding: 18px;\">\n      <div style=\"font-size: 15px; color: var(--text); font-weight: 500;\">Accept / reject<\u002Fdiv>\n      <p style=\"font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-top: 6px;\">Approving individual recommendations before transform — turns the viewer into a review tool.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px dashed var(--border); border-radius: 4px; padding: 18px;\">\n      <div style=\"font-size: 15px; color: var(--text); font-weight: 500;\">Pack authoring<\u002Fdiv>\n      <p style=\"font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-top: 6px;\">Pack selection and editing. v1 is view-only, single pack.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px dashed var(--border); border-radius: 4px; padding: 18px;\">\n      <div style=\"font-size: 15px; color: var(--text); font-weight: 500;\">Run permalinks<\u002Fdiv>\n      <p style=\"font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-top: 6px;\">Shareable links — needs URL-encoded documents or storage; revisit privacy first.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── FOOTER ──────────────────────────────────────── -->\n  <div style=\"display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 72px; padding-top: 24px; border-top: 1px solid var(--border);\">\n    <span style=\"font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--text-dim);\">Praxis · RFC-0002 · UX Spec v0.1<\u002Fspan>\n    <span style=\"font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--text-dim);\">Deterministic · auditable · no backend<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
